aid: joby-aviation
name: Joby Aviation
description: >-
  Joby Aviation is a California-based aerospace company developing an all-electric
  vertical take-off and landing (eVTOL) aircraft intended to operate as part of
  a fast, quiet, and convenient air taxi service. Joby's piloted four-passenger
  S4 aircraft is designed for a top speed of 200 mph and zero operating emissions,
  and the company is pursuing FAA Type Certification under Part 23. Joby has
  strategic relationships with Toyota for manufacturing, Delta Air Lines, Virgin
  Atlantic and ANA for distribution, Uber for ground integration, the U.S.
  Department of Defense (Agility Prime), and operates a vertically integrated
  program covering aircraft, batteries (JoeBen cell technology via Joby's
  battery group), software, and pilot training. Joby acquired Uber Elevate and
  is co-located with manufacturing facilities in Marina and Santa Cruz, California,
  with plans for early commercial passenger service in Dubai and U.S. cities.
